name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          if [ -f 404.html ]; then cp 404.html dist/404.html; fi
          if [ -d attached_assets ]; then cp -R attached_assets dist/attached_assets; fi
          echo "calculate-gomrk static deploy - $GITHUB_SHA" > dist/version.txt
          find dist -maxdepth 2 -type f -print

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

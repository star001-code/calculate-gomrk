<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="حاسبة تقريبية لتكلفة الجمارك والرسوم" />
  <title>حاسبة الجمارك</title>
  <style>
    :root {
      font-family: Tahoma, Arial, sans-serif;
      color: #102018;
      background: #eef7f1;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; min-height: 100vh; }
    button, input { font: inherit; }
    .page-shell { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 48px 0; }
    .hero { text-align: center; margin-bottom: 28px; }
    .eyebrow { display: inline-flex; margin: 0 0 10px; padding: 7px 14px; border-radius: 999px; background: #d8f3df; color: #0f6a36; font-weight: 700; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 4rem); line-height: 1.1; }
    .subtitle { max-width: 680px; margin: 16px auto 0; color: #53615a; font-size: 1.1rem; line-height: 1.8; }
    .calculator-card { background: rgba(255,255,255,.92); border: 1px solid #dce8df; border-radius: 28px; padding: 28px; box-shadow: 0 24px 80px rgba(16,32,24,.12); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    label { display: grid; gap: 8px; color: #20362a; font-weight: 700; }
    input { width: 100%; border: 1px solid #cddbd2; border-radius: 16px; padding: 14px 16px; outline: none; background: #fbfffc; color: #102018; }
    input:focus { border-color: #15803d; box-shadow: 0 0 0 4px rgba(21,128,61,.12); }
    .actions { display: flex; justify-content: flex-start; margin: 18px 0 0; }
    button { border: 0; border-radius: 999px; padding: 12px 22px; cursor: pointer; background: #15803d; color: white; font-weight: 800; }
    button:hover { background: #126d34; }
    .summary { display: grid; gap: 12px; margin-top: 24px; }
    .summary > div { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px; border-radius: 18px; background: #f5faf6; }
    .summary span { color: #53615a; }
    .summary strong { font-size: 1.1rem; }
    .summary .total { background: #102018; color: white; }
    .summary .total span { color: #d6eadc; }
    .summary .total strong { font-size: 1.35rem; }
    .notice { margin: 18px auto 0; max-width: 760px; color: #66756d; text-align: center; line-height: 1.8; }
    @media (max-width: 700px) {
      .page-shell { width: min(100% - 20px, 960px); padding: 26px 0; }
      .calculator-card { padding: 20px; border-radius: 22px; }
      .form-grid { grid-template-columns: 1fr; }
      .summary > div { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">أداة مجانية</p>
      <h1>حاسبة الجمارك</h1>
      <p class="subtitle">احسب التكلفة التقريبية للمنتج بعد الشحن والجمارك والرسوم الإضافية.</p>
    </section>

    <section class="calculator-card" aria-label="حاسبة الجمارك">
      <div class="form-grid">
        <label>سعر المنتج
          <input id="itemPrice" inputmode="decimal" placeholder="مثال: 250000" />
        </label>
        <label>تكلفة الشحن
          <input id="shippingCost" inputmode="decimal" placeholder="مثال: 30000" />
        </label>
        <label>نسبة الجمارك %
          <input id="customsRate" inputmode="decimal" value="5" placeholder="مثال: 5" />
        </label>
        <label>رسوم إضافية
          <input id="extraFees" inputmode="decimal" value="0" placeholder="مثال: 10000" />
        </label>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">تصفير</button>
      </div>

      <div class="summary">
        <div><span>قيمة المنتج + الشحن</span><strong id="taxableAmount">0 د.ع.‏</strong></div>
        <div><span>قيمة الجمارك</span><strong id="customsValue">0 د.ع.‏</strong></div>
        <div><span>الرسوم الإضافية</span><strong id="feesValue">0 د.ع.‏</strong></div>
        <div class="total"><span>الإجمالي التقريبي</span><strong id="totalValue">0 د.ع.‏</strong></div>
      </div>
    </section>

    <p class="notice">ملاحظة: النتيجة تقريبية وليست تسعيرة رسمية. النسب والرسوم تختلف حسب نوع البضاعة والقوانين المحلية.</p>
  </main>

  <script>
    const fields = {
      itemPrice: document.getElementById('itemPrice'),
      shippingCost: document.getElementById('shippingCost'),
      customsRate: document.getElementById('customsRate'),
      extraFees: document.getElementById('extraFees'),
    };

    const output = {
      taxableAmount: document.getElementById('taxableAmount'),
      customsValue: document.getElementById('customsValue'),
      feesValue: document.getElementById('feesValue'),
      totalValue: document.getElementById('totalValue'),
    };

    function parseNumber(value) {
      const number = Number(String(value || '').replace(/,/g, ''));
      return Number.isFinite(number) ? number : 0;
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('ar-IQ', {
        style: 'currency',
        currency: 'IQD',
        maximumFractionDigits: 0,
      }).format(Number.isFinite(value) ? value : 0);
    }

    function calculate() {
      const price = parseNumber(fields.itemPrice.value);
      const shipping = parseNumber(fields.shippingCost.value);
      const rate = parseNumber(fields.customsRate.value);
      const fees = parseNumber(fields.extraFees.value);
      const taxableAmount = price + shipping;
      const customs = taxableAmount * (rate / 100);
      const total = taxableAmount + customs + fees;

      output.taxableAmount.textContent = formatCurrency(taxableAmount);
      output.customsValue.textContent = formatCurrency(customs);
      output.feesValue.textContent = formatCurrency(fees);
      output.totalValue.textContent = formatCurrency(total);
    }

    Object.values(fields).forEach((input) => input.addEventListener('input', calculate));
    document.getElementById('resetBtn').addEventListener('click', () => {
      fields.itemPrice.value = '';
      fields.shippingCost.value = '';
      fields.customsRate.value = '5';
      fields.extraFees.value = '0';
      calculate();
    });

    calculate();
  </script>
</body>
</html>
